<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 510" width="900" height="510">
    <rect width="100%" height="100%" fill="#ffffff" />
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#333333" />
        </marker>
        <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#1e88e5" />
        </marker>
        <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#e53935" />
        </marker>
        <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
            <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15" />
        </filter>
    </defs>

    <rect x="50" y="50" width="200" height="80" rx="8" fill="#f5f5f5" stroke="#757575" stroke-width="2" filter="url(#shadow)" />
    <text x="150" y="85" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#212121">Host PC</text>
    <text x="150" y="105" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#616161">Python Telemetry Script</text>

    <rect x="75" y="240" width="150" height="60" rx="6" fill="#fff3e0" stroke="#fb8c00" stroke-width="2" filter="url(#shadow)" />
    <text x="150" y="265" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#212121">HC-06 Module</text>
    <text x="150" y="285" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#616161">Bluetooth Receiver</text>

    <rect x="75" y="360" width="150" height="60" rx="6" fill="#fff3e0" stroke="#fb8c00" stroke-width="2" filter="url(#shadow)" />
    <text x="150" y="385" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#212121">KY-040 Encoder</text>
    <text x="150" y="405" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#616161">Menu / Push Button</text>

    <rect x="300" y="160" width="220" height="300" rx="10" fill="#e3f2fd" stroke="#1e88e5" stroke-width="3" filter="url(#shadow)" />
    <text x="410" y="220" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#0d47a1">STM32 NUCLEO</text>
    <text x="410" y="240" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#0d47a1">U545RE-Q</text>
    <text x="410" y="280" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#1565c0">Embedded Rust Firmware</text>
    <text x="410" y="300" font-family="sans-serif" font-size="12" font-style="italic" text-anchor="middle" fill="#1976d2">(embassy-rs executor)</text>
    <text x="410" y="340" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#424242">Central State Machine</text>

    <rect x="650" y="100" width="180" height="50" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="2" filter="url(#shadow)" />
    <text x="740" y="125" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#212121">SSD1306 OLED</text>
    <text x="740" y="140" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#616161">Digital Readout</text>

    <rect x="650" y="180" width="180" height="50" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="2" filter="url(#shadow)" />
    <text x="740" y="205" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#212121">2x SG90 Servos</text>
    <text x="740" y="220" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#616161">Analog Dash Needles</text>

    <rect x="650" y="260" width="180" height="50" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="2" filter="url(#shadow)" />
    <text x="740" y="285" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#212121">WS2812B Stick</text>
    <text x="740" y="300" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#616161">RGB Visual Alarm</text>

    <rect x="650" y="340" width="180" height="50" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="2" filter="url(#shadow)" />
    <text x="740" y="365" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#212121">Piezo Buzzer</text>
    <text x="740" y="380" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#616161">Acoustic Alarm</text>

    <rect x="650" y="420" width="180" height="60" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="2" filter="url(#shadow)" />
    <text x="740" y="440" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#212121">3V Coin Motor</text>
    <text x="740" y="455" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#616161">Haptic Alarm</text>
    <text x="740" y="470" font-family="sans-serif" font-size="10" font-style="italic" text-anchor="middle" fill="#616161">(via 2N2222 Transistor)</text>

    <path d="M 150 130 L 150 232" fill="none" stroke="#e53935" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-red)" />
    <text x="160" y="185" font-family="sans-serif" font-size="12" font-weight="bold" fill="#c62828">Bluetooth Wireless</text>
    <text x="160" y="200" font-family="sans-serif" font-size="11" fill="#c62828">Telemetry Strings</text>

    <path d="M 225 270 L 292 270" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrow)" />
    <text x="260" y="262" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333333">UART</text>

    <path d="M 225 390 L 292 390" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrow)" />
    <text x="260" y="382" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333333">EXTI</text>

    <path d="M 410 160 L 410 90 L 258 90" fill="none" stroke="#1e88e5" stroke-width="2" marker-end="url(#arrow-blue)" />
    <text x="330" y="80" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1565c0">USB HID</text>
    <text x="330" y="105" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1565c0">(Multimedia Keys)</text>

    <path d="M 520 200 L 580 200 L 580 125 L 642 125" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrow)" />
    <text x="615" y="120" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333333">I2C</text>

    <path d="M 520 240 L 580 240 L 580 205 L 642 205" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrow)" />
    <text x="615" y="200" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333333">PWM</text>

    <path d="M 520 285 L 642 285" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrow)" />
    <text x="615" y="280" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333333">GPIO</text>

    <path d="M 520 330 L 580 330 L 580 365 L 642 365" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrow)" />
    <text x="615" y="360" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333333">GPIO</text>

    <path d="M 520 370 L 580 370 L 580 450 L 642 450" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrow)" />
    <text x="615" y="445" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333333">GPIO</text>
</svg>
